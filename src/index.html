<!DOCTYPE html>
<html lang="en" data-theme="bumblebee">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbus Weather App</title>
  <link href="./output.css" rel="stylesheet">
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-100 to-sky-200 flex flex-col">

  <!-- navbar code-->
  <div class="navbar bg-base-100 shadow-sm flex justify-center">
    <svg width="64px" height="64px" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"
      xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="iconify iconify--twemoji"
      preserveAspectRatio="xMidYMid meet" fill="#000000">
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
      <g id="SVGRepo_iconCarrier">
        <path fill="#F4900C"
          d="M13.917 36a.417.417 0 0 1-.371-.607L17 29h-5.078c-.174 0-.438-.031-.562-.297c-.114-.243-.057-.474.047-.703L15 19c.078-.067 6.902.393 7 .393a.417.417 0 0 1 .369.608l-3.817 6h5.032c.174 0 .329.108.391.271a.418.418 0 0 1-.119.461l-9.666 9.166a.422.422 0 0 1-.273.101z">
        </path>
        <path fill="#d4d4d4"
          d="M28 4c-.825 0-1.62.125-2.369.357A6.498 6.498 0 0 0 19.5 0c-3.044 0-5.592 2.096-6.299 4.921A4.459 4.459 0 0 0 10.5 4A4.5 4.5 0 0 0 6 8.5c0 .604.123 1.178.339 1.704A4.98 4.98 0 0 0 5 10c-2.762 0-5 2.238-5 5s2.238 5 5 5h23a8 8 0 1 0 0-16z">
        </path>
      </g>
    </svg>
    <a class="btn btn-ghost text-2xl text-orange-500 ml-2">NIMBUS</a>
  </div>

  <main class="flex-1 flex flex-col items-center justify-center gap-4 p-4">

    <!-- Searchbar code-->
    <div class="flex justify-center bg-white px-2 py-2 rounded-xl">
      <input type="search" id="search-input" placeholder="Search for your City" class="outline-none" />
        <!-- search button -->
         <button id="search-btn" type="button" class="hover:text-green-600 hover:shadow-md hover:shadow-gray-700 rounded-full p-1">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </g>
        </svg>
        </button>
    </div>

    <!-- Weather card -->
    <div class="w-full max-w-sm sm:max-w-md bg-white rounded-2xl shadow-2xl p-6 sm:p-8 text-center">

      <!-- Weather Icon -->
      <div class="flex justify-center mb-4">
        <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="Weather Icon"
          class="w-20 h-20 sm:w-24 sm:h-24" />
      </div>

      <!-- Weather card main Details -->
      <h2 class="text-2xl sm:text-3xl font-bold text-gray-800">Calicut</h2>
      <p class="text-gray-500 text-sm sm:text-base mt-1">Wednesday, Sunny</p>

      <div class="mt-4">
        <p class="text-4xl sm:text-5xl font-extrabold text-blue-600">32°C</p>
        <p class="text-gray-600 mt-2">Feels like 35°C</p>
      </div>

      <!-- Weather card extra Details -->
      <div class="grid grid-cols-2 gap-4 mt-6 text-sm sm:text-base">
        <div class="bg-blue-50 rounded-xl p-3">
          <p class="text-gray-500">Humidity</p>
          <p class="font-semibold text-gray-800">65%</p>
        </div>
        <div class="bg-blue-50 rounded-xl p-3">
          <p class="text-gray-500">Wind</p>
          <p class="font-semibold text-gray-800">12 km/h</p>
        </div>
        <div class="bg-blue-50 rounded-xl p-3">
          <p class="text-gray-500">Pressure</p>
          <p class="font-semibold text-gray-800">1012 hPa</p>
        </div>
        <div class="bg-blue-50 rounded-xl p-3">
          <p class="text-gray-500">Visibility</p>
          <p class="font-semibold text-gray-800">8 km</p>
        </div>
      </div>
    </div>
</main>

</body>
</html>
